version: "3.9"

services:
  productservice:
    build:
      context: ./ProductService
    container_name: productservice
    ports:
      - "5001:8080"

  orderservice:
    build:
      context: ./OrderService
    container_name: orderservice
    ports:
      - "5002:8080"
    depends_on:
      - productservice

  apigateway:
    build:
      context: ./ApiGateway
    container_name: apigateway
    ports:
      - "9000:8080"
    depends_on:
      - productservice
      - orderservice